name: uztexconf
description: "UztexConf — corporate video conferencing app with LiveKit"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.5
  livekit_client: ^2.3.3
  permission_handler: ^11.3.1
  intl: ^0.20.2
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/ios/
    - assets/android/
